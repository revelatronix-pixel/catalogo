<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarktStore – iPhones Reacondicionados</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; color: #f1f1f3; padding-bottom: 60px; }

  .header { background: linear-gradient(135deg, #0a0a0f 0%, #1a1030 50%, #0f0a1e 100%); border-bottom: 1px solid #ffffff12; padding: 16px 24px 14px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
  .header-brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
  .header-logo-img { height: 44px; object-fit: contain; border-radius: 8px; }
  .header-logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #c4b5fd, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-badge { font-size: 11px; background: #a78bfa22; color: #a78bfa; border: 1px solid #a78bfa44; border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .header-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }

  .filters { padding: 14px 16px 0; max-width: 900px; margin: 0 auto; }
  .search-input { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid #ffffff18; background: #16151f; color: #f1f1f3; font-size: 14px; outline: none; margin-bottom: 11px; transition: border-color 0.2s; }
  .search-input:focus { border-color: #a78bfa55; }
  .search-input::placeholder { color: #4b5563; }

  .pills { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill { padding: 5px 13px; border-radius: 20px; border: 1.5px solid #ffffff18; background: transparent; color: #9ca3af; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .pill.active { border-color: #a78bfa; background: #a78bfa22; color: #a78bfa; }
  .pill:hover:not(.active) { border-color: #ffffff35; color: #d1d5db; }

  .slider-wrap { margin-bottom: 16px; }
  .slider-label { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; }
  .slider-label span:first-child { color: #6b7280; }
  .slider-label span:last-child { color: #a78bfa; font-weight: 700; }
  input[type="range"] { width: 100%; accent-color: #a78bfa; cursor: pointer; }

  .results-count { font-size: 12px; color: #4b5563; margin-bottom: 13px; }

  .stats-bar { max-width: 900px; margin: 0 auto 14px; padding: 0 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-pill { background: #16151f; border: 1px solid #ffffff0f; border-radius: 10px; padding: 7px 13px; font-size: 12px; color: #9ca3af; }
  .stat-pill strong { color: #f1f1f3; }

  .loading { text-align: center; padding: 60px 20px; color: #4b5563; }
  .loading .icon { font-size: 40px; margin-bottom: 12px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .grid { max-width: 900px; margin: 0 auto; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .card { background: #13121c; border-radius: 16px; border: 1px solid #ffffff0f; overflow: hidden; transition: transform 0.18s, border-color 0.18s; }
  .card:hover { transform: translateY(-3px); border-color: #a78bfa33; }
  .card-image { background: linear-gradient(135deg, #1e1b2e, #2d1f3d); display: flex; align-items: center; justify-content: center; height: 160px; overflow: hidden; }
  .card-image img { width: 100%; height: 100%; object-fit: contain; padding: 12px; }
  .card-fallback { font-size: 52px; }
  .card-body { padding: 13px 14px 12px; }
  .card-meta { font-size: 10px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .card-model { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #f1f1f3; line-height: 1.3; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; display: flex; align-items: center; gap: 3px; border: 1px solid; }
  .price-row { display: flex; align-items: center; justify-content: space-between; }
  .price { font-size: 18px; font-weight: 800; color: #f1f1f3; }
  .price-sub { font-size: 10px; color: #6b7280; }
  .btn-wa { background: linear-gradient(135deg, #25d366, #128c7e); color: #fff; border: none; border-radius: 9px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; transition: opacity 0.15s; text-decoration: none; }
  .btn-wa:hover { opacity: 0.88; }

  .empty { text-align: center; margin-top: 50px; color: #4b5563; padding: 0 16px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* Admin */
  .admin-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: #0a0a0f; border: 1px solid #ffffff08; border-radius: 50px; padding: 10px 14px; font-size: 11px; color: #1f1d2e; cursor: pointer; font-family: inherit; }
  .admin-toggle:hover { color: #4b5563; }
  .admin-panel { display: none; position: fixed; bottom: 60px; right: 20px; z-index: 998; background: #16151f; border: 1.5px solid #a78bfa44; border-radius: 14px; padding: 16px; width: 280px; box-shadow: 0 8px 32px #00000080; }
  .admin-panel.open { display: block; }
  .admin-panel input[type=password] { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #ffffff18; background: #0a0a0f; color: #f1f1f3; font-size: 13px; outline: none; margin-bottom: 10px; font-family: inherit; }
  .admin-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #a78bfa44; background: #a78bfa22; color: #a78bfa; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 8px; }
  .admin-info { font-size: 11px; color: #6b7280; text-align: center; margin-top: 8px; }
  .refresh-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #10b98144; background: #10b98122; color: #10b981; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

  .footer { text-align: center; margin-top: 40px; color: #374151; font-size: 11px; line-height: 1.8; padding: 0 16px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <img class="header-logo-img"
      src="Fotos IPhone por Modelo/logo.jpg"
      alt="MarktStore"
      onerror="this.style.display='none';document.getElementById('logoText').style.display='block'" />
    <span id="logoText" class="header-logo-text" style="display:none">MarktStore</span>
    <span class="header-badge">iPhone</span>
  </div>
  <p class="header-sub">iPhones reacondicionados · Garantía incluida · Envíos a Chile 🇨🇱</p>
</div>

<div class="filters" id="filtersSection" style="display:none">
  <input class="search-input" id="searchInput" placeholder="🔍  Buscar modelo o color..." oninput="render()" />
  <div class="pills" id="pills"></div>
  <div class="slider-wrap">
    <div class="slider-label"><span>Precio máximo</span><span id="priceLabel">Todos</span></div>
    <input type="range" id="priceRange" min="0" max="2000000" step="10000" value="2000000" oninput="updatePrice()" />
  </div>
  <p class="results-count" id="resultsCount"></p>
</div>

<div class="stats-bar" id="statsBar" style="display:none"></div>

<div class="loading" id="loading">
  <div class="icon">📱</div>
  <p style="font-size:13px">Cargando stock...</p>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">
  <div class="empty-icon">🔍</div>
  <p>Sin resultados para ese filtro</p>
</div>

<div class="footer" id="footer" style="display:none">
  Todos los equipos incluyen garantía · Av. Nueva Providencia 2234, Local P30<br>
  WhatsApp: +56 9 4594 6961 · www.marktstoreiphone.cl
</div>

<!-- Admin botón invisible -->
<button class="admin-toggle" onclick="toggleAdmin()">⚙</button>
<div class="admin-panel" id="adminPanel">
  <div id="passSection">
    <input type="password" id="adminPass" placeholder="Contraseña admin" onkeydown="if(event.key==='Enter')checkPass()" />
    <button class="admin-btn" onclick="checkPass()">Ingresar</button>
  </div>
  <div id="adminTools" style="display:none">
    <button class="refresh-btn" onclick="cargarStock()">🔄 Actualizar Stock Ahora</button>
    <div class="admin-info" id="lastUpdate"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzEVwEpJR0uzwHF9pVZZcPBDgikPkAF16OmhzkUA6n4z_yZUfC3gwYh6dwK0MqmgOr_/exec";
const ADMIN_PASSWORD = "markt2024";

const MODEL_IMAGES = {
  "IPHONE 17 AIR":      "Fotos IPhone por Modelo/iphone-air-colors.png",
  "IPHONE 17 PRO MAX":  "Fotos IPhone por Modelo/iphone-17-pro-max-colors.png",
  "IPHONE 17 PRO":      "Fotos IPhone por Modelo/iphone-17-pro-colors.png",
  "IPHONE 17E":         "Fotos IPhone por Modelo/iphone-17e-colors.png",
  "IPHONE 17":          "Fotos IPhone por Modelo/iphone-17-colors.png",
  "IPHONE 16 PRO MAX":  "Fotos IPhone por Modelo/iphone-16-pro-max-colors.png",
  "IPHONE 16 PRO":      "Fotos IPhone por Modelo/iphone-16-pro-colors.png",
  "IPHONE 16 PLUS":     "Fotos IPhone por Modelo/iphone-16-plus-colors.png",
  "IPHONE 16E":         "Fotos IPhone por Modelo/iphone-16e-colors.png",
  "IPHONE 16":          "Fotos IPhone por Modelo/iphone-16-colors.png",
  "IPHONE 15 PRO MAX":  "Fotos IPhone por Modelo/fall-2023-iphone-colors-iphone-15-pro-max.png",
  "IPHONE 15 PRO":      "Fotos IPhone por Modelo/fall-2023-iphone-colors-iphone-15-pro.png",
  "IPHONE 15 PLUS":     "Fotos IPhone por Modelo/fall-2023-iphone-colors-iphone-15-plus.png",
  "IPHONE 15":          "Fotos IPhone por Modelo/fall-2023-iphone-colors-iphone-15.png",
  "IPHONE 14 PRO MAX":  "Fotos IPhone por Modelo/iphone-14-pro-max-colors.png",
  "IPHONE 14 PRO":      "Fotos IPhone por Modelo/iphone-14-pro-colors.png",
  "IPHONE 14 PLUS":     "Fotos IPhone por Modelo/iphone-14-plus-colors-spring-2023.png",
  "IPHONE 14":          "Fotos IPhone por Modelo/iphone-14-colors-spring-2023.png",
  "IPHONE 13 PRO MAX":  "Fotos IPhone por Modelo/2022-spring-iphone13-pro-max-colors.png",
  "IPHONE 13 PRO":      "Fotos IPhone por Modelo/2022-spring-iphone13-pro-colors.png",
  "IPHONE 13 MINI":     "Fotos IPhone por Modelo/2022-iphone13-mini-colors.png",
  "IPHONE 13":          "Fotos IPhone por Modelo/2022-spring-iphone13-colors.png",
  "IPHONE 12 PRO MAX":  "Fotos IPhone por Modelo/iphone12-pro-max-colors.jpg",
  "IPHONE 12 PRO":      "Fotos IPhone por Modelo/iphone12-pro-colors.jpg",
  "IPHONE 12 MINI":     "Fotos IPhone por Modelo/2021-iphone12-mini-colors.png",
  "IPHONE 12":          "Fotos IPhone por Modelo/2021-iphone12-colors.png",
  "IPHONE 11 PRO MAX":  "Fotos IPhone por Modelo/iphone11promax.png",
  "IPHONE 11 PRO":      "Fotos IPhone por Modelo/iphone11pro.png",
  "IPHONE 11":          "Fotos IPhone por Modelo/iphone11.png",
  "IPHONE SE 3RA GEN":  "Fotos IPhone por Modelo/iphone-se-3rd-gen-colors.png",
  "IPHONE SE 2020":     "Fotos IPhone por Modelo/iphone-se-3rd-gen-colors.png",
  "IPHONE SE":          "Fotos IPhone por Modelo/iphone-se-3rd-gen-colors.png",
};

function getImageUrl(modelo) {
  const m = modelo.toUpperCase().trim();
  if (MODEL_IMAGES[m]) return MODEL_IMAGES[m];
  let best = null, bestLen = 0;
  for (const key of Object.keys(MODEL_IMAGES)) {
    if (m.includes(key) && key.length > bestLen) { best = key; bestLen = key.length; }
  }
  return best ? MODEL_IMAGES[best] : null;
}

let allPhones = [], activeFilter = "Todos", maxPrice = 0;

function toggleAdmin() { document.getElementById("adminPanel").classList.toggle("open"); }
function checkPass() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    document.getElementById("passSection").style.display = "none";
    document.getElementById("adminTools").style.display = "block";
  } else { alert("Contraseña incorrecta"); }
}

function updatePrice() {
  maxPrice = Number(document.getElementById("priceRange").value);
  const label = maxPrice >= Number(document.getElementById("priceRange").max)
    ? "Todos" : "$" + maxPrice.toLocaleString("es-CL");
  document.getElementById("priceLabel").textContent = label;
  render();
}

async function cargarStock() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("grid").innerHTML = "";
  document.getElementById("filtersSection").style.display = "none";
  document.getElementById("statsBar").style.display = "none";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    allPhones = data.filter(p => p.modelo && p.modelo.trim() !== "");

    // Ajustar slider al precio máximo real
    const prices = allPhones.map(p => p.precio).filter(p => p > 0);
    const topPrice = prices.length ? Math.max(...prices) : 2000000;
    const sliderMax = Math.ceil(topPrice / 100000) * 100000 || 2000000;
    const slider = document.getElementById("priceRange");
    slider.max = sliderMax;
    slider.value = sliderMax;
    maxPrice = sliderMax;
    document.getElementById("priceLabel").textContent = "Todos";

    document.getElementById("loading").style.display = "none";
    document.getElementById("lastUpdate").textContent = "Actualizado: " + new Date().toLocaleTimeString("es-CL");
    buildUI();
  } catch(e) {
    document.getElementById("loading").innerHTML = `<div class="icon">⚠️</div><p style="font-size:13px;color:#ef4444">Error al cargar stock.<br>Intenta recargar la página.</p>`;
  }
}

function buildUI() {
  const families = [...new Set(allPhones.map(p => {
    const m = p.modelo.toUpperCase().trim();
    const match = m.match(/IPHONE\s+(\d+\s*(PRO MAX|PRO|PLUS|MINI|AIR|SE.*)?)/i);
    return match ? "IPHONE " + match[1].trim() : m.split(" ").slice(0,2).join(" ");
  }))].slice(0, 10);

  const pillsEl = document.getElementById("pills");
  pillsEl.innerHTML = "";
  activeFilter = "Todos";
  ["Todos", ...families].forEach(f => {
    const btn = document.createElement("button");
    btn.className = "pill" + (f === "Todos" ? " active" : "");
    btn.textContent = f;
    btn.onclick = () => {
      activeFilter = f;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    pillsEl.appendChild(btn);
  });

  document.getElementById("filtersSection").style.display = "block";
  document.getElementById("footer").style.display = "block";
  document.getElementById("statsBar").style.display = "flex";
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-pill">🟢 Disponibles: <strong>${allPhones.length}</strong></div>
    <div class="stat-pill">📱 Modelos únicos: <strong>${new Set(allPhones.map(p=>p.modelo.trim())).size}</strong></div>
  `;
  render();
}

function render() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sliderAtMax = maxPrice >= Number(document.getElementById("priceRange").max);
  const filtered = allPhones.filter(p => {
    const matchFilter = activeFilter === "Todos" ||
      p.modelo.toUpperCase().includes(activeFilter.replace("IPHONE ","").trim());
    const matchSearch = p.modelo.toLowerCase().includes(search) ||
      p.color.toLowerCase().includes(search);
    const matchPrice = sliderAtMax || p.precio === 0 || p.precio <= maxPrice;
    return matchFilter && matchSearch && matchPrice;
  });

  document.getElementById("resultsCount").textContent =
    `${filtered.length} equipo${filtered.length !== 1 ? "s" : ""} disponible${filtered.length !== 1 ? "s" : ""}`;

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if (!filtered.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  grid.innerHTML = filtered.map(phone => {
    const imgUrl = getImageUrl(phone.modelo);
    const hasPrice = phone.precio > 0;
    const waMsg = encodeURIComponent(
      `Hola! Me interesa el ${phone.modelo} ${phone.capacidad} ${phone.color}. ¿Está disponible?`
    );
    const imgHtml = imgUrl
      ? `<img src="${imgUrl}" alt="${phone.modelo}" onerror="this.parentElement.innerHTML='<div class=\\'card-fallback\\'>📱</div>'">`
      : `<div class="card-fallback">📱</div>`;

    return `
      <div class="card">
        <div class="card-image">${imgHtml}</div>
        <div class="card-body">
          <div class="card-meta">${phone.capacidad} · ${phone.color}</div>
          <div class="card-model">${phone.modelo}</div>
          <div class="tags">
            <span class="tag" style="background:#d1fae522;color:#10b981;border-color:#10b98144">🔋 100%</span>
            <span class="tag" style="background:#d1fae522;color:#10b981;border-color:#10b98144">🟢 Disponible</span>
          </div>
          <div class="price-row">
            <div>
              <div class="price">${hasPrice ? "$"+phone.precio.toLocaleString("es-CL") : "Consultar"}</div>
              ${hasPrice ? '<div class="price-sub">CLP</div>' : ""}
            </div>
            <a href="https://wa.me/56945946961?text=${waMsg}" target="_blank" class="btn-wa">💬 Consultar</a>
          </div>
        </div>
      </div>`;
  }).join("");
}

// Cargar stock automáticamente al abrir la página
cargarStock();
</script>
</body>
</html>
